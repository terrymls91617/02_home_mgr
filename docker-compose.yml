services:
  # 前端服务
  web:
    build: ./web
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - home-mgr-network

  # 后端服务
  server:
    build: ./server
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - GF_SERVER_PORT=8000
      - GF_DATABASE_HOST=db
      - GF_DATABASE_PORT=3306
      - GF_DATABASE_NAME=home_mgr
      - GF_DATABASE_USER=root
      - GF_DATABASE_PASS=home_mgr_2024
      - ADMIN_PASSWORD=admin123456
      - JWT_SECRET=home_mgr_default_secret_2024
    depends_on:
      db:
        condition: service_healthy
    networks:
      - home-mgr-network

  # 数据库服务
  db:
    image: docker.m.daocloud.io/library/mysql:8.0
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=home_mgr_2024
      - MYSQL_DATABASE=home_mgr
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-phome_mgr_2024"]
      timeout: 20s
      retries: 10
    networks:
      - home-mgr-network

volumes:
  mysql_data:

networks:
  home-mgr-network:
    driver: bridge
